<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>artifact.host — v5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@1,500;1,600;1,700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:   #0e0c09;
  --ink-2: #5a5449;
  --ink-3: #a09890;
  --rule:  #e2dbd2;
  --bg:    #fefdfb;
  --bg-2:  #f6f1eb;
  --amber: #b36b20;
  --serif: 'Lora', Georgia, serif;
  --mono:  'JetBrains Mono', monospace;
}

html, body { height: 100%; background: var(--bg); color: var(--ink); }
body { font-family: var(--mono); display: flex; flex-direction: column; }

/* ── HEADER ── */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 40px; height: 52px;
  border-bottom: 1px solid var(--rule); flex-shrink: 0;
}
.logo {
  font-family: var(--serif);
  font-size: 16px; font-weight: 600; font-style: italic;
  letter-spacing: -.01em; color: var(--ink);
}
.logo span { color: var(--ink-3); font-weight: 500; }
nav { display: flex; align-items: center; gap: 26px; }
nav a {
  font-family: var(--mono); font-size: 12px; font-weight: 400;
  color: var(--ink-2); text-decoration: none; letter-spacing: .04em;
}
nav a:hover { color: var(--ink); }
.btn-nav {
  font-family: var(--mono); font-size: 12px; font-weight: 400;
  color: var(--ink); border: 1px solid var(--rule);
  padding: 6px 16px; border-radius: 2px; letter-spacing: .03em;
  cursor: pointer; background: none;
}
.btn-nav:hover { border-color: var(--ink-2); }

/* ── MAIN ── */
main {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; padding: 52px 24px 100px;
  overflow-y: auto;
}

.s1 { animation: rise .4s .00s both; }
.s2 { animation: rise .4s .07s both; }
.s3 { animation: rise .4s .13s both; }
.s4 { animation: rise .4s .19s both; }
.s5 { animation: rise .4s .25s both; }
@keyframes rise {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── HERO ── */
.hero { text-align: center; margin-bottom: 40px; max-width: 600px; }

.headline {
  font-family: var(--serif);
  font-size: clamp(36px, 4.4vw, 50px);
  font-weight: 600; font-style: italic;
  line-height: 1.08; letter-spacing: -.02em;
  color: var(--ink); margin-bottom: 16px;
}

.subline {
  font-family: var(--mono);
  font-size: 13px; font-weight: 300;
  color: var(--ink-2); line-height: 1.85;
  letter-spacing: .02em; max-width: 400px; margin: 0 auto;
}

/* ── SECTION LABEL ── */
.section-label {
  font-family: var(--mono);
  font-size: 11px; font-weight: 400;
  letter-spacing: .12em; text-transform: uppercase;
  color: var(--ink-3); margin-bottom: 13px; text-align: center;
}

/* ── PLATFORM PICKER ── */
.platforms {
  display: flex; gap: 8px; justify-content: center;
  flex-wrap: wrap; margin-bottom: 20px;
  max-width: 620px; width: 100%;
}

.platform {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  padding: 15px 20px 12px;
  border: 1px solid var(--rule); border-radius: 4px;
  cursor: pointer; background: transparent;
  transition: border-color .12s, background .12s;
  min-width: 90px;
}
.platform:hover { border-color: var(--ink-2); background: var(--bg-2); }
.platform.active { border-color: var(--ink); background: var(--bg-2); }

.picon {
  width: 36px; height: 36px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  background: #fff;
  border: 1px solid var(--rule);
  overflow: hidden;
}
.picon img {
  width: 24px; height: 24px;
  object-fit: contain;
  display: block;
}

.pname {
  font-family: var(--mono);
  font-size: 11px; font-weight: 400; letter-spacing: .02em;
  color: var(--ink-2); text-align: center; line-height: 1.4;
  white-space: nowrap;
}
.platform.active .pname { color: var(--ink); }

/* ── SNIPPET ── */
.snippet-wrap {
  width: 100%; max-width: 620px;
  max-height: 0; opacity: 0;
  overflow: hidden;
  flex-shrink: 0; /* overflow:hidden collapses flex min-height to 0; without this the flex column compresses the box and clips the snippet */
  transition: max-height .4s ease, opacity .3s ease, margin .35s ease;
  margin-bottom: 0;
}
.snippet-wrap.visible {
  max-height: 600px; opacity: 1; margin-bottom: 28px;
}

.snippet-box {
  background: #111009;
  border-radius: 4px;
  padding: 16px 18px 16px;
  position: relative;
  /* no overflow:hidden — was clipping content */
}

.snippet-step {
  font-family: var(--mono);
  font-size: 11px; font-weight: 400;
  letter-spacing: .09em; text-transform: uppercase;
  color: #5a544c; margin-bottom: 12px;
  padding-right: 60px; /* room for copy btn */
}

.snippet-code {
  font-family: var(--mono);
  font-size: 12.5px; font-weight: 300;
  color: #cfc9c0; line-height: 1.85;
  white-space: pre-wrap;        /* let long comment lines wrap instead of overflowing */
  overflow-wrap: anywhere;      /* break unbroken tokens (long paths) at the box edge */
}
.snippet-code::-webkit-scrollbar { height: 4px; }
.snippet-code::-webkit-scrollbar-thumb { background: #3a3530; border-radius: 2px; }

.snippet-code .k { color: #c98840; }
.snippet-code .v { color: #8bbf8e; }
.snippet-code .c { color: #3e3830; }

.copy-btn {
  position: absolute; top: 14px; right: 14px;
  font-family: var(--mono);
  font-size: 11px; font-weight: 400;
  letter-spacing: .06em; text-transform: uppercase;
  color: #5a544c; border: 1px solid #2c2820;
  border-radius: 2px; padding: 4px 11px;
  cursor: pointer; background: transparent;
  transition: color .12s, border-color .12s;
}
.copy-btn:hover { color: #cfc9c0; border-color: #4a4540; }
.copy-btn.ok { color: #8bbf8e; border-color: #3a5038; }

/* ── DIVIDER ── */
.divider {
  display: flex; align-items: center; gap: 14px;
  width: 100%; max-width: 620px; margin-bottom: 20px;
}
.divider-line { flex: 1; height: 1px; background: var(--rule); }
.divider-text {
  font-family: var(--mono);
  font-size: 11px; font-weight: 400;
  letter-spacing: .09em; text-transform: uppercase;
  color: var(--ink-3); white-space: nowrap;
}

/* ── PASTE ZONE ── */
.paste-wrap { width: 100%; max-width: 620px; }

.paste-box {
  background: var(--bg-2); border: 1px solid var(--rule);
  border-radius: 3px; position: relative;
  transition: border-color .15s; margin-bottom: 13px;
}
.paste-box:focus-within { border-color: var(--ink-2); }

.paste-box textarea {
  display: block; width: 100%; height: 112px;
  background: transparent; border: none; outline: none;
  resize: none; overflow: hidden; /* no scrollbar on empty state */
  font-family: var(--mono); font-size: 13px; font-weight: 300;
  color: var(--ink); padding: 15px 16px; line-height: 1.7;
  caret-color: var(--amber);
}
.paste-box textarea::placeholder { color: var(--ink-3); }
/* show scrollbar only when content exceeds height */
.paste-box textarea:not(:placeholder-shown) { overflow-y: auto; }

.paste-hint {
  position: absolute; bottom: 11px; right: 11px;
  font-family: var(--mono); font-size: 11px; color: var(--ink-3);
  background: var(--bg); border: 1px solid var(--rule);
  border-radius: 2px; padding: 3px 9px; pointer-events: none;
}

.opts-row {
  display: flex; align-items: center; gap: 7px;
  margin-bottom: 20px; flex-wrap: wrap;
}
.pill {
  font-family: var(--mono); font-size: 12px; font-weight: 400;
  color: var(--ink-2); border: 1px solid var(--rule);
  border-radius: 999px; padding: 5px 14px;
  cursor: pointer; background: transparent; transition: all .12s;
}
.pill:hover { border-color: var(--ink-2); color: var(--ink); }
.pill.on { border-color: var(--ink); color: var(--ink); background: var(--bg-2); }
.opts-div { width: 1px; height: 16px; background: var(--rule); margin: 0 2px; }

.deploy-row { display: flex; align-items: center; gap: 18px; }

.deploy-btn {
  font-family: var(--serif);
  font-size: 16px; font-weight: 600; font-style: italic;
  letter-spacing: -.01em; color: var(--bg);
  background: var(--ink); border: none; border-radius: 3px;
  padding: 12px 28px; cursor: pointer;
  display: flex; align-items: center; gap: 9px;
  transition: background .15s; white-space: nowrap;
}
.deploy-btn:hover { background: #26211c; }
.deploy-btn .arr {
  font-family: var(--mono); font-size: 13px;
  font-style: normal; font-weight: 300;
}

.deploy-meta {
  font-family: var(--mono); font-size: 11px; font-weight: 300;
  color: var(--ink-3); line-height: 1.8; letter-spacing: .02em;
}
</style>
</head>
<body>

<header>
  <div class="logo">artifact<span>.host</span></div>
  <nav>
    <a href="#">docs</a>
    <a href="#">dashboard</a>
    <button class="btn-nav">sign in</button>
  </nav>
</header>

<main>

  <!-- HERO -->
  <div class="hero s1">
    <h1 class="headline">Share what<br>your AI built.</h1>
    <p class="subline">One tool call from your agent. Renders live at a short URL — nothing to install for viewers.</p>
  </div>

  <!-- PLATFORM LABEL -->
  <div class="section-label s2">Connect your AI assistant</div>

  <!-- PLATFORM PICKER -->
  <div class="platforms s2">

    <button class="platform" onclick="pick('claude', this)">
      <div class="picon">
        <img src="https://www.google.com/s2/favicons?domain=claude.ai&sz=64" alt="Claude">
      </div>
      <div class="pname">Claude</div>
    </button>

    <button class="platform" onclick="pick('openai', this)">
      <div class="picon">
        <img src="https://www.google.com/s2/favicons?domain=openai.com&sz=64" alt="OpenAI">
      </div>
      <div class="pname">GPT / Codex</div>
    </button>

    <button class="platform" onclick="pick('cursor', this)">
      <div class="picon">
        <img src="https://www.google.com/s2/favicons?domain=cursor.com&sz=64" alt="Cursor">
      </div>
      <div class="pname">Cursor</div>
    </button>

    <button class="platform" onclick="pick('vscode', this)">
      <div class="picon">
        <img src="https://www.google.com/s2/favicons?domain=code.visualstudio.com&sz=64" alt="VS Code">
      </div>
      <div class="pname">VS Code</div>
    </button>

    <button class="platform" onclick="pick('windsurf', this)">
      <div class="picon">
        <img src="https://www.google.com/s2/favicons?domain=windsurf.com&sz=64" alt="Windsurf">
      </div>
      <div class="pname">Windsurf</div>
    </button>

  </div>

  <!-- SNIPPET BOX -->
  <div class="snippet-wrap s3" id="snippet-wrap">
    <div class="snippet-box">
      <div class="snippet-step" id="snippet-step">–</div>
      <div class="snippet-code" id="snippet-code"></div>
      <button class="copy-btn" id="copy-btn" onclick="copyIt()">copy</button>
    </div>
  </div>

  <!-- DIVIDER -->
  <div class="divider s4">
    <div class="divider-line"></div>
    <div class="divider-text">or paste HTML to try it</div>
    <div class="divider-line"></div>
  </div>

  <!-- PASTE ZONE -->
  <div class="paste-wrap s5">
    <div class="paste-box">
      <textarea placeholder="Paste your HTML here..."></textarea>
      <div class="paste-hint">⌘↵ deploy</div>
    </div>
    <div class="opts-row">
      <button class="pill">1h</button>
      <button class="pill">1d</button>
      <button class="pill on">7d</button>
      <button class="pill">30d</button>
      <div class="opts-div"></div>
      <button class="pill on">public</button>
      <button class="pill">password</button>
    </div>
    <div class="deploy-row">
      <button class="deploy-btn">
        Deploy artifact <span class="arr">→</span>
      </button>
      <div class="deploy-meta">
        Returns a live URL + edit token.<br>
        Expires in 7 days. Always free.
      </div>
    </div>
  </div>

</main>

<script>
const data = {
  'claude': {
    step: 'Add to Claude Desktop config — or run one command in Claude Code',
    raw: `# Claude Code (terminal)
claude mcp add artifact-host npx -y artifact-host-mcp

# Claude Desktop  ~/Library/Application Support/Claude/claude_desktop_config.json
{
  "mcpServers": {
    "artifact-host": {
      "command": "npx",
      "args": ["-y", "artifact-host-mcp"]
    }
  }
}`,
    html: `<span class="c"># Claude Code (terminal)</span>
claude mcp add artifact-host <span class="v">npx -y artifact-host-mcp</span>

<span class="c"># Claude Desktop — ~/Library/Application Support/Claude/claude_desktop_config.json</span>
{
  <span class="k">"mcpServers"</span>: {
    <span class="k">"artifact-host"</span>: {
      <span class="k">"command"</span>: <span class="v">"npx"</span>,
      <span class="k">"args"</span>: [<span class="v">"-y"</span>, <span class="v">"artifact-host-mcp"</span>]
    }
  }
}`
  },
  'openai': {
    step: 'Add to ChatGPT Desktop or Codex CLI',
    raw: `# Codex CLI
codex mcp add artifact-host npx -y artifact-host-mcp

# ChatGPT Desktop → Settings → Integrations → Add MCP Server
# Command: npx   Args: -y artifact-host-mcp`,
    html: `<span class="c"># Codex CLI</span>
codex mcp add artifact-host <span class="v">npx -y artifact-host-mcp</span>

<span class="c"># ChatGPT Desktop → Settings → Integrations → Add MCP Server</span>
<span class="c"># Command: npx   Args: -y artifact-host-mcp</span>`
  },
  'cursor': {
    step: 'Add to .cursor/mcp.json',
    raw: `{
  "mcpServers": {
    "artifact-host": {
      "command": "npx",
      "args": ["-y", "artifact-host-mcp"]
    }
  }
}`,
    html: `{
  <span class="k">"mcpServers"</span>: {
    <span class="k">"artifact-host"</span>: {
      <span class="k">"command"</span>: <span class="v">"npx"</span>,
      <span class="k">"args"</span>: [<span class="v">"-y"</span>, <span class="v">"artifact-host-mcp"</span>]
    }
  }
}`
  },
  'vscode': {
    step: 'Add to VS Code settings (agent mode)',
    raw: `// .vscode/settings.json
{
  "mcp.servers": {
    "artifact-host": {
      "command": "npx",
      "args": ["-y", "artifact-host-mcp"]
    }
  }
}`,
    html: `<span class="c">// .vscode/settings.json</span>
{
  <span class="k">"mcp.servers"</span>: {
    <span class="k">"artifact-host"</span>: {
      <span class="k">"command"</span>: <span class="v">"npx"</span>,
      <span class="k">"args"</span>: [<span class="v">"-y"</span>, <span class="v">"artifact-host-mcp"</span>]
    }
  }
}`
  },
  'windsurf': {
    step: 'Add to Windsurf MCP config',
    raw: `// ~/.codeium/windsurf/mcp_config.json
{
  "mcpServers": {
    "artifact-host": {
      "command": "npx",
      "args": ["-y", "artifact-host-mcp"]
    }
  }
}`,
    html: `<span class="c">// ~/.codeium/windsurf/mcp_config.json</span>
{
  <span class="k">"mcpServers"</span>: {
    <span class="k">"artifact-host"</span>: {
      <span class="k">"command"</span>: <span class="v">"npx"</span>,
      <span class="k">"args"</span>: [<span class="v">"-y"</span>, <span class="v">"artifact-host-mcp"</span>]
    }
  }
}`
  }
};

let active = null;
function pick(id, el) {
  if (active === id) {
    el.classList.remove('active');
    document.getElementById('snippet-wrap').classList.remove('visible');
    active = null; return;
  }
  document.querySelectorAll('.platform').forEach(p => p.classList.remove('active'));
  el.classList.add('active'); active = id;
  const d = data[id];
  document.getElementById('snippet-step').textContent = d.step;
  document.getElementById('snippet-code').innerHTML = d.html;
  document.getElementById('copy-btn').textContent = 'copy';
  document.getElementById('copy-btn').classList.remove('ok');
  document.getElementById('snippet-wrap').classList.add('visible');
}

function copyIt() {
  if (!active) return;
  navigator.clipboard.writeText(data[active].raw).then(() => {
    const b = document.getElementById('copy-btn');
    b.textContent = 'copied ✓'; b.classList.add('ok');
    setTimeout(() => { b.textContent = 'copy'; b.classList.remove('ok'); }, 2000);
  });
}

document.querySelectorAll('.pill').forEach(p => {
  p.addEventListener('click', () => {
    const ttl = ['1h','1d','7d','30d'];
    const vis = ['public','password'];
    const t = p.textContent.trim();
    const grp = ttl.includes(t) ? ttl : vis;
    document.querySelectorAll('.pill').forEach(s => { if (grp.includes(s.textContent.trim())) s.classList.remove('on'); });
    p.classList.add('on');
  });
});
</script>
</body>
</html>
