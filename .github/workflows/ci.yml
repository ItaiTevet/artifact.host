name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      # Build the self-host bundle once; both e2e suites run against it.
      - run: npm run build
        env:
          NEXT_PUBLIC_AUTH_PROVIDER: local-password
      # API-level end-to-end (self-host: sqlite + local-password, ephemeral DB).
      - run: npm run e2e
      # Browser-level end-to-end through the real UI (catches form/auth-wiring regressions).
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e:browser
